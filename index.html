<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ES 추정 산출기</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="container">

  <h1>ES 추정 산출기</h1>

  <!-- 입력 영역 -->
  <div class="card">
    <h2>기초 입력</h2>

    <label>계약금액</label>
    <input type="number" id="contractAmount" />

    <label>직접공사비</label>
    <input type="number" id="directCost" />

    <label>간접공사비</label>
    <input type="number" id="indirectCost" />

    <label>착공시점 지수</label>
    <input type="number" id="startIndex" />

    <label>변동시점 지수</label>
    <input type="number" id="currentIndex" />

    <button onclick="calculate()">계산하기</button>
  </div>

  <!-- 결과 -->
  <div class="card result">
    <h2>결과</h2>

    <div>지수변동률: <span id="rate">0</span></div>
    <div>K0: <span id="k0">0</span></div>
    <div>지수조정율: <span id="adjustRate">0</span></div>
    <div>조정금액: <span id="resultAmount">0</span></div>
  </div>

  <!-- 저장 -->
  <div class="card">
    <button onclick="saveData()">JSON 저장</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
