<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물가변동(ESC) 산출 자동화 시스템</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>물가변동(ESC) 산출 자동화 시스템</h1>
            <p>국가/지방계약법 기준 지수조정율 임시 계산 및 엑셀 출력기</p>
        </header>

        <main>
            <section class="input-section">
                <h2>1. 기초 데이터 입력</h2>
                <div class="form-group">
                    <label for="contractName">공사명</label>
                    <input type="text" id="contractName" value="OOOOOOOO 이전 신축 건축공사">
                </div>
                <div class="form-group">
                    <label for="contractAmount">계약금액 (원)</label>
                    <input type="number" id="contractAmount" value="435335108459">
                </div>
                <div class="form-group">
                    <label for="baseDate">기준시점 (입찰일)</label>
                    <input type="date" id="baseDate" value="2024-01-17">
                </div>
                <div class="form-group">
                    <label for="compareDate">비교시점 (조정일)</label>
                    <input type="date" id="compareDate" value="2025-09-01">
                </div>
                <div class="form-group">
                    <label for="kValue">지수조정율 (K값, %)</label>
                    <input type="number" step="0.0001" id="kValue" value="2.72">
                </div>
            </section>

            <section class="result-section">
                <h2>2. 자동 계산 결과</h2>
                <div class="result-card">
                    <p>경과 일수: <strong id="resDays">0일</strong> <span id="reqDays" class="badge">판정중</span></p>
                    <p>물가변동 등락율: <strong id="resK">0%</strong> <span id="reqK" class="badge">판정중</span></p>
                    <p>조정 예정 금액: <strong id="resAmount" class="highlight-text">0 원</strong></p>
                </div>
            </section>

            <section class="action-section">
                <button id="downloadBtn" class="primary-btn">📥 "1.보고서" 엑셀 다운로드</button>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
